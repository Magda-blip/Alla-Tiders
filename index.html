</div>

<header class="text-center py-6 border-b border-gray-300">

    <!-- Date -->
    <p id="date" class="text-sm text-gray-500 mb-2"></p>

       <script>
    const today = new Date();

    const options = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    };

    let formattedDate = today.toLocaleDateString('sv-SE', options);

    // Split text into words
    let words = formattedDate.split(" ");

    // Cap first letter on each word
    words = words.map(word => 
        word.charAt(0).toUpperCase() + word.slice(1)
    );

    // Sätt ihop igen
    formattedDate = words.join(" ");

    document.getElementById("date").textContent = formattedDate;
</script>
